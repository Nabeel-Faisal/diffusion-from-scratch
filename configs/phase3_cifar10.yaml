# Phase 3 — Text-conditioned DDPM on CIFAR-10 (32×32 RGB, 10 classes)
#
# Classifier-free guidance (CFG) training:
#   Each caption is replaced by an empty string "" with probability
#   training.p_uncond, training the model for both conditional and
#   unconditional generation with shared weights.
#
# At inference, CFG combines both passes:
#   ε_cfg = ε_uncond + w · (ε_cond − ε_uncond)   (Ho et al. 2022, Eq. 6)
# where w = sampling.guidance_scale.

dataset:
  name: "cifar10"
  batch_size: 128
  num_workers: 4

diffusion:
  T: 1000
  beta_schedule: "cosine"
  cosine_s: 0.008          # offset to prevent β_t from being too small near t=0

model:
  img_channels: 3
  base_channels: 128
  channel_mults: [1, 2, 4]  # feature maps: 128 → 256 → 512
  num_res_blocks: 2
  time_emb_dim: 256
  text_emb_dim: 512          # CLIP ViT-B/32 output dimension
  attn_heads: 8              # 8 heads × 64 dim_head = 512 at bottleneck
  # cross-attention inserted at: bottleneck (between mid_block1/2) + up_blocks[0]
  # n_ctx=4 virtual context tokens from the CLIP embedding (default in CrossAttentionBlock)

clip:
  model_name: "ViT-B/32"    # frozen; never updated during training

training:
  epochs: 50
  lr: 2.0e-4
  lr_warmup_steps: 500
  p_uncond: 0.1              # probability of dropping caption → unconditional pass (CFG)
  grad_clip: 1.0
  ema_decay: 0.9999
  save_every: 5              # save checkpoint every N epochs
  sample_every: 5            # save sample grid every N epochs
  n_samples: 16              # samples per grid
  device: "cuda"

sampling:
  sampler: "ddim"
  ddim_steps: 50
  ddim_eta: 0.0              # η=0 → fully deterministic
  guidance_scale: 7.5        # w in CFG formula; w=0 → unconditional, w>0 → guided
